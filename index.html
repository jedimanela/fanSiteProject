<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Lego Fansite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>All About Lego</h1>
    </header>
    <div class="grid-container">
        <div class="movies">
            <h1>All things movies</h1>
            <div id="moviePosters">
                <a href="./movieReviews.html">
                    <img src="./pictures/movieImages.jpg" alt="Set of 4 Lego Movie Posters">
                </a>
            </div>
        </div>
        <div class="games">
            <h1>All things games</h1>
            <div id="gamePosters">
                <a href="./games.html">
                    <img src="./pictures/gameImages.jpg" alt="Set of 4 Lego Game Posters">
                </a>
            </div>
        </div>
        <div class="fb">
            <iframe class="fbIframe" src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2FLEGO%2F&tabs=timeline&width=340&height=500&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true&appId" width="340" height="500" allow="fullscreen; autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>

            <h1>Upcoming Releases</h1>
            <div class="relContainer">
                <div id="turtles">
                    <a href="https://www.lego.com/en-us/product/teenage-mutant-ninja-turtles-figures-40878">
                        <figure>
                            <img src="./pictures/Turtles.png" alt="Set of 4 Teenage Mutant Ninja Turtles Legos">
                            <figcaption>Teenage Mutant Ninja Turtles Figures $39.99 <br>
                                        Coming Soon on April 1, 2026
                            </figcaption>
                        </figure> 
                    </a>
                </div>
                <div id="mando">
                    <a href="https://www.lego.com/en-us/product/the-mandalorian-and-grogu-allies-villains-40856">
                        <figure>
                            <img src="./pictures/Mandalorian.png" alt="Set of 5 Lego figurines from the Mandalorian">
                            <figcaption>The Mandalorian and Grogu: Allies & Villains $39.99 <br>
                                        Coming Soon on April 26, 2026
                            </figcaption>
                        </figure> 
                    </a>
                </div>
                <div id="snoopy">
                    <a href="https://www.lego.com/en-us/product/peanuts-snoopys-doghouse-21368">
                        <figure>
                            <img src="./pictures/Snoopy.png" alt="Snoopy and Woodstock on top of dog house Lego set">
                            <figcaption>Peanuts: Snoopy's Doghouse $89.99 <br>
                                        Coming Soon on June 1, 2026
                            </figcaption>
                        </figure> 
                    </a>
                </div>
            </div>
        </div>

            <h1>Upcoming Events</h1>

                <tr><th><a href="https://brickcon.org/">BrickCon 2026</a></th><td>September 12th & 13th, 2026 <br>Bellevue, WA</td></tr>
                <tr><th><a href="https://www.lego.com/en-us/stores/events/lbr-ucs-launch-party">LEGO® Star Wars™ Death Star Launch Party</a></th><td>September 30th at midnight <br>Select Locations</td></tr>
            </table>
