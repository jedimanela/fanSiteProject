<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego Games</title>
    <link rel="stylesheet" href="gamesStyle.css">
</head>
<body>
    <header>
    <h1>Lego Games</h1>
    </header>
    <button class="legoButton" onclick="history.back()">Back to Main Page</button>
    <div class="games">
        <h1>New Releases</h1>
        <div class="newContainer">
            <div id="you">
                <div>
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/1hQAoGj01Rc?si=Vx_vyLBJ02Tl0ymu" title="YouTube video player" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                    </iframe>
                </div>
            </div>
            <div id="batman">
                <figure>
                    <a href="https://www.lego.com/en-us/games/lego-batman-legacy-dark-knight">
                        <img src="./pictures/legoBatmanGame.avif" alt="Lego Batman Video Game"></a>
                    <figcaption><b>Lego Batman: Legacy of the Dark Knight</b><br>
                        Become the Dark Knight and take on Gotham City’s most infamous Super-Villains. <br>In this open-world action-adventure, 
                        you'll experience Batman's journey, from Bruce Wayne's training with The League of Shadows to becoming Gotham City's 
                        iconic protector. <br>Forge a new family of allies with Jim Gordon, Catwoman, Robin, Nightwing and Batgirl to help the 
                        Dark Knight confront infamous faces from the Rogues Gallery, including The Joker, The Penguin, Mr. Freeze, Poison Ivy, Bane and many more. <br>
                        Are you ready to build the legacy of the Dark Knight?<br>
                    </figcaption>
                </figure> 
            </div>
            <div id="party">
                <figure>
                    <a href="https://www.lego.com/en-us/games/lego-party">
                        <img src="./pictures/legoParty.jpeg" alt="Lego Party Video Game"></a>
                    <figcaption><b>Lego Party!</b> <br>
                        LEGO® Party! is a 4-player party game that’s built different! <br>
                        Compete against your friends in wacky Challenge Zones and 60 hilarious minigames from across your favorite LEGO sets like 
                        LEGO Pirates, LEGO Space, LEGO NINJAGO® and more. <br> Join your friends online no matter their platform, or get together 
                        for a LEGO Party game night. With multiple game modes and tons of minifigures to unlock, you’ll have all the bricks to build 
                        the ultimate party! <br> Challenge players near or far, customize your character and compete in a variety of awesome minigames 
                        to get as many Golden Bricks as you can, by any means necessary! But beware, watch out for monsters, traps and flying roast 
                        turkeys on your way to become the next star of LEGO Party!
                    </figcaption>
                </figure> 
            </div>
            <div id="voyagers">
                <figure>
                    <a href="https://www.lego.com/en-us/games/lego-voyagers">
                        <img src="./pictures/legoVoyagers.avif" alt="Lego Voyagers Video Game"></a>
                    <figcaption><b>Lego Voyagers</b><br>
                        From the makers of LEGO® Builder's Journey comes a new 2-player co-op adventure about friendship and play. 
                        When two friends make it their mission to rescue an abandoned spaceship, they embark on a journey beyond their wildest dreams, 
                        ultimately learning the value of being connected.
                    </figcaption>
                </figure> 
            </div>
        </div>
    </div>
</body>
</html>
